# Konfiguracja Redis dla scenariusza flash sale (gorąca ścieżka rezerwacji stocku).
# Montowana przez docker-compose (repo shop-infra) do
# /usr/local/etc/redis/redis.conf i uruchamiana przez `redis-server <ten plik>`.

# AOF — odtworzenie stanu (liczniki stocku, rezerwacje) po restarcie.
appendonly yes

# Limit pamięci w demie; produkcyjnie dobierz do rozmiaru danych / użyj Redis Cluster.
maxmemory 256mb

# KRYTYCZNE: nigdy nie eksmituj kluczy — utrata licznika stocku = błędna sprzedaż
# (overselling). Przy przekroczeniu pamięci zapisy zwracają błąd zamiast eksmisji.
maxmemory-policy noeviction
